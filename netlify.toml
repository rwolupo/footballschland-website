[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/blockblog"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/blockblog/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/blog/categories/*"
  to = "/blog"
  status = 301
